version: 0.4.0
targets:
  makerdiary-nrf52840-mdk-usb-dongle:
    # website: https://wiki.makerdiary.com/nrf52840-mdk-usb-dongle/
    chip: nrf52840
    leds:
      # led0
      - # note: this is the RGB LED red channel
        color: red
        pin: P0_23
        active: low
      # led1
      - # note: this is the RGB LED green channel
        color: green
        pin: P0_22
        active: low
      # led2
      - # note: this is the RGB LED blue channel
        color: blue
        pin: P0_24
        active: low
    # buttons:
    #   # button0
    #   - # note: this is configurable via UICR
    #     pin: P0_18
    #     active: low

ariel_doc:
  name: Makerdiary nRF52840 MDK USB Dongle
  url: https://web.archive.org/web/20260508214910/https://wiki.makerdiary.com/nrf52840-mdk-usb-dongle/
  builders:
    makerdiary-nrf52840-mdk-usb-dongle:
      chip: nrf52840
      tier: "3"
      support:
        user_usb: supported
        ethernet_over_usb: supported
