version: 0.4.0
targets:
  seeedstudio-xiao-nrf52840-plus:
    chip: nrf52840
    flags:
      - has_usb_device_port
    leds:
      # led0
      - pin: P0_26
        color: red
        active: low
        aliases:
          - USER_LED_R
      # led1
      - pin: P0_06
        color: blue
        active: low
        aliases:
          - USER_LED_B
      # led2
      - pin: P0_30
        color: green
        active: low
        aliases:
          - USER_LED_G

ariel_doc:
  name: Seeed Studio XIAO NRF52840 Plus
  url: https://web.archive.org/web/20260101232815/https://wiki.seeedstudio.com/XIAO_BLE/
  builders:
    seeedstudio-xiao-nrf52840-plus:
      chip: nrf52840
      tier: "3"
      support:
        user_usb: needs_testing
        ethernet_over_usb: needs_testing
