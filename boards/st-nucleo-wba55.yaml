version: 0.4.0
targets:
  st-nucleo-wba55:
    chip: stm32wba55cg
    ariel:
      swi: USART2
    leds:
      # led0
      - pin: PB4
        aliases:
          - LD1
        color: blue
      # led1
      - pin: PA9
        aliases:
          - LD2
        color: green
      # led2
      - pin: PB8
        aliases:
          - LD3
        color: red
    buttons:
      # button0
      - pin: PC13
        aliases:
          - B1
      # button1
      - pin: PB6
        aliases:
          - B2
      # button2
      - pin: PB7
        aliases:
          - B3

ariel_doc:
  name: ST NUCLEO-WBA55CG
  url: https://web.archive.org/web/20240803070523/https://www.st.com/en/evaluation-tools/nucleo-wba55cg.html
  builders:
    st-nucleo-wba55:
      chip: stm32wba55cg
      tier: "3"
      support: {}
