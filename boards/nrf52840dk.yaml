version: 0.3.0
targets:
  nrf52840dk:
    chip: nrf52840
    flags:
      - has_usb_device_port
    leds:
      led0:
        color: green
        pin: P0_13
        active: low
      led1:
        color: green
        pin: P0_14
        active: low
      led2:
        color: green
        pin: P0_15
        active: low
      led3:
        color: green
        pin: P0_16

    buttons:
      button0:
        pin: P0_11
        active: low
      button1:
        pin: P0_12
        active: low
      button2:
        pin: P0_24
        active: low
      button3:
        pin: P0_25
        active: low

ariel_doc:
  name: nRF52840-DK
  url: https://web.archive.org/web/20250112154748/https://www.nordicsemi.com/Products/Development-hardware/nrf52840-dk
  builders:
    nrf52840dk:
      chip: nrf52840
      tier: "1"
      support:
        user_usb: supported
        ethernet_over_usb: supported
