version: 0.4.0
targets:
  seeedstudio-xiao-esp32c6:
    chip: esp32c6fx4
    flags:
      - has_usb_cdc_acm_port
    leds:
      # led0
      - pin: GPIO15
        color: yellow
        active: low
        aliases:
          - D4
          - USER_LED
    buttons:
      # button0
      - pin: GPIO9
        active: low
        aliases:
          - BOOT

ariel_doc:
  name: Seeed Studio XIAO ESP32C6
  url: https://web.archive.org/web/20250827114042/https://wiki.seeedstudio.com/xiao_esp32c6_getting_started/
  builders:
    seeedstudio-xiao-esp32c6:
      chip: esp32c6fx4
      tier: "2"
      support: {}
