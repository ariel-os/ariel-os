boards:
  nrf9151-dk:
    chip: nrf9151
    leds:
      led0:
        pin: P0_00
        active: low
        color: green
        aliases:
        - LED1
      led1:
        pin: P0_01
        active: low
        color: green
        aliases:
        - LED2
      led2:
        pin: P0_04
        active: low
        color: green
        aliases:
        - LED3
      led3:
        pin: P0_05
        active: low
        color: green
        aliases:
        - LED4
    buttons:
      button0:
        pin: P0_08
        aliases:
        - Button 1
      button1:
        pin: P0_09
        aliases:
        - Button 2
      button2:
        pin: P0_18
        aliases:
        - Button 3
      button3:
        pin: P0_19
        aliases:
        - Button 4
