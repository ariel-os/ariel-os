version: 0.4.0
targets:
  espressif-esp32-c3-devkit-rust-1:
    chip: esp32-c3-mini-1
    flags:
      - has_usb_cdc_acm_port
    buttons:
      # button0
      - pin: GPIO9
        active: low
    leds:
      # led0
      - pin: GPIO7

