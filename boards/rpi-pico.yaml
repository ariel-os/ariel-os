version: 0.3.0
targets:
  rpi-pico:
    chip: rp2040
    flags:
      - has_usb_device_port
    leds:
      led0:
        pin: PIN_25
        color: green

ariel_doc:
  name: Raspberry Pi Pico
  url: https://web.archive.org/web/20250101022830/https://www.raspberrypi.com/products/raspberry-pi-pico/
  builders:
    rpi-pico:
      chip: rp2040
      tier: "1"
      support:
        user_usb: supported
        ethernet_over_usb: supported
