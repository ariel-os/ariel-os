version: 0.4.0
targets:
  nrf5340dk-app:
    chip: nrf5340-app
    flags:
      - has_usb_device_port
    leds:
      # led0
      - color: green
        pin: P0_28
        active: low
      # led1
      - color: green
        pin: P0_29
        active: low
      # led2
      - color: green
        pin: P0_30
        active: low
      # led3
      - color: green
        pin: P0_31

    buttons:
      # button0
      - pin: P0_23
        active: low
      # button1
      - pin: P0_24
        active: low
      # button2
      - pin: P0_08
        active: low
      # button3
      - pin: P0_09
        active: low

  nrf5340dk-net:
    chip: nrf5340-net

ariel_doc:
  name: nRF5340-DK
  url: https://web.archive.org/web/20250115224621/https://www.nordicsemi.com/Products/Development-hardware/nrf5340-dk
  builders:
    nrf5340dk-app:
      chip: nrf5340-app
      tier: "1"
      support:
        user_usb: supported
        ethernet_over_usb: supported
        ble: not_available
    nrf5340dk-net:
      chip: nrf5340-net
      tier: "1"
      support:
        user_usb: not_available
        ethernet_over_usb: not_available
        ble: supported
