---

# Defines the different support statuses.
support_keys:
  - name: supported
    icon: ✅
    description: supported
  - name: supported_with_caveats
    icon: ☑️
    description: supported with some caveats
  - name: needs_testing
    icon: 🚦
    description: needs testing
  - name: not_currently_supported
    icon: ❌
    description: available in hardware, but not currently supported by Ariel OS
  - name: not_available
    icon: '–'
    description: not available on this piece of hardware

# Defines existing pieces of functionality, hardware or software.
functionalities:
  - name: debug_channel
    title: Debug Channel
    support_criteria: example-log
    description: debug channel (over SWD or JTAG)
  - name: logging
    title: Logging
    support_criteria: example-log
    description:
  - name: gpio
    title: GPIO
    # Name of the laze app (as defined in the app's laze.yml)
    # or laze module (as defined in laze-project.yml)
    # that must be built for the functionality to be marked
    # as supported for a specific piece of hardware.
    support_criteria: tests_gpio
    description:
  - name: i2c_controller
    title: I2C Controller Mode
    support_criteria: i2c-loopback
    description: I2C in controller mode
  - name: spi_main
    title: SPI Main Mode
    support_criteria: spi-loopback
    description: SPI in main mode
  - name: uart
    title: UART
    support_criteria: uart-loopback
    description: UART
  - name: ethernet
    title: Ethernet
    support_criteria: ethernet-stm32
    description:
  - name: user_usb
    title: User USB
    support_criteria: example-usb-serial
    description:
  - name: ethernet_over_usb
    title: Ethernet over USB
    support_criteria: usb-ethernet
    description:
  - name: wifi
    title: Wi-Fi
    support_criteria: wifi
    description:
  - name: ble
    title: Bluetooth Low Energy
    support_criteria: ble-scanner
    description:
  - name: hwrng
    title: Hardware Random Number Generator
    support_criteria: test-random-getrandom
    description:
  - name: storage
    title: Persistent Storage
    support_criteria: example-storage
    description:

note_snippets:
  - name: ethernet-identity-based-mac-address
    content: |-
      ### Ethernet Link

      The Ethernet MAC address is derived from the device identity using [`if_index` `0`](https://ariel-os.github.io/ariel-os/dev/docs/api/ariel_os/identity/fn.interface_eui48.html).
      A different index should therefore be used to generate other EUI-48 identifiers.
  - name: espressif-devkit-two-usb-ports-only-usb-otg
    content: |-
      ##### USB Ports

      This board features two USB ports: one is labeled "USB" while the other is labeled "UART".

      The "USB" port is connected to the USB OTG peripheral of the MCU and can only be used by the application.

      The "UART" port is connected to a USB ⟷ UART adapter, wired to UART0.
      It can be used to flash the board through the bootloader using `espflash`.
      It can also be used to obtain logs when the [`logging-over-uart`](../logging.md#logging-transports) laze module is enabled.
  - name: espressif-devkit-two-usb-ports-with-usb-otg
    content: |-
      ##### USB Ports

      This board features two USB ports: one is labeled "USB" while the other is labeled "UART".

      The "USB" port is connected to the internal USB PHY, which is shared by the USB CDC-ACM/JTAG USB peripheral and the USB OTG peripheral.
      It can be used to flash the board either through the bootloader over USB CDC-ACM using `espflash`, or over JTAG using probe-rs.
      When the USB OTG peripheral is not used by the application, the "USB" port can also be used to obtain logs when the [`logging-over-usb`](../logging.md#logging-transports) laze module is enabled.

      The "UART" port is connected to a USB ⟷ UART adapter, wired to UART0.
      It can be used to flash the board through the bootloader using `espflash`.
      It can also be used to obtain logs when the [`logging-over-uart`](../logging.md#logging-transports) laze module is enabled.

      Note: On the ESP32-S3, enabling `logging-over-uart` will [not prevent the logs from also being printed using the USB CDC-ACM USB peripheral](https://github.com/esp-rs/esp-hal/issues/4510).
  - name: espressif-devkit-two-usb-ports-no-usb-otg
    content: |-
      ##### USB Ports

      This board features two USB ports: one is labeled "USB" while the other is labeled "UART".

      The "USB" port is connected to the USB CDC-ACM/JTAG USB peripheral of the MCU and can be used to flash the board either through the bootloader over USB CDC-ACM using `espflash`, or over JTAG using probe-rs.
      It can also be used to obtain logs when the [`logging-over-usb`](../logging.md#logging-transports) laze module is enabled.

      The "UART" port is connected to a USB ⟷ UART adapter, wired to UART0.
      It can be used to flash the board through the bootloader using `espflash`.
      It can also be used to obtain logs when the [`logging-over-uart`](../logging.md#logging-transports) laze module is enabled.

      Note: On the ESP32-C3, enabling `logging-over-uart` will [not prevent the logs from also being printed using the USB CDC-ACM USB peripheral](https://github.com/esp-rs/esp-hal/issues/4510).

